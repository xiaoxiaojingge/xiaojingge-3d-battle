<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>摸鱼大乱斗 - 英雄分配</title>
  <link rel="stylesheet" href="css/common.css">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #0F0A1A 0%, #1A1030 40%, #12082A 100%);
      color: var(--text-on-dark);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden;
    }

    /* Animated bg */
    .bg-grid {
      position: fixed; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,107,53,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,107,53,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridScroll 20s linear infinite;
    }
    @keyframes gridScroll {
      0% { transform: translateY(0); }
      100% { transform: translateY(60px); }
    }

    .loading-container {
      text-align: center;
      position: relative; z-index: 1;
      padding: 20px;
      max-width: 900px; width: 100%;
    }

    /* Hero reveal */
    .hero-reveal {
      margin-bottom: 40px;
    }
    .hero-reveal-label {
      font-size: 0.85rem; color: var(--text-on-dark-mid);
      margin-bottom: 12px; text-transform: uppercase; letter-spacing: 2px;
    }
    .hero-reveal-card {
      display: inline-flex; flex-direction: column;
      align-items: center; padding: 40px;
      background: linear-gradient(135deg, rgba(255,107,53,0.08), rgba(255,143,171,0.05));
      border: 2px solid rgba(255,107,53,0.2);
      border-radius: var(--radius-xl);
      position: relative; overflow: hidden;
      animation: bounceIn 0.8s ease;
    }
    .hero-reveal-card::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 30%, rgba(255,107,53,0.1), transparent 70%);
    }
    .hero-avatar-big {
      width: 120px; height: 120px; border-radius: 50%;
      background: linear-gradient(135deg, rgba(255,107,53,0.2), rgba(255,143,171,0.15));
      border: 3px solid var(--primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 4rem; margin-bottom: 16px;
      box-shadow: 0 0 40px rgba(255,107,53,0.3);
      position: relative; z-index: 1;
      animation: fishFloat 3s ease-in-out infinite;
    }
    .hero-name-big {
      font-family: var(--font-display); font-size: 1.8rem; font-weight: 700;
      background: linear-gradient(135deg, var(--primary-light), var(--yellow));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 6px; position: relative; z-index: 1;
    }
    .hero-role-big {
      font-size: 0.9rem; color: var(--text-on-dark-mid);
      margin-bottom: 16px; position: relative; z-index: 1;
    }
    .hero-stats-mini {
      display: flex; gap: 24px; position: relative; z-index: 1;
    }
    .hero-stat {
      text-align: center;
    }
    .hero-stat-val {
      font-family: var(--font-display); font-size: 1.1rem;
      font-weight: 700; color: var(--yellow);
    }
    .hero-stat-label { font-size: 0.7rem; color: var(--text-on-dark-mid); }

    /* Skills preview */
    .skills-preview {
      display: flex; gap: 10px; margin-top: 20px;
      justify-content: center; position: relative; z-index: 1;
    }
    .skill-icon-pre {
      width: 48px; height: 48px; border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; position: relative;
    }
    .skill-key {
      position: absolute; bottom: -8px;
      font-size: 0.6rem; font-weight: 700; color: var(--yellow);
      background: rgba(0,0,0,0.6); padding: 1px 6px; border-radius: 4px;
    }

    /* Team lineup */
    .team-lineup {
      display: flex; justify-content: center; gap: 60px;
      margin-bottom: 40px;
    }
    .lineup-team {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .lineup-label {
      font-family: var(--font-display); font-size: 0.9rem; font-weight: 600;
      padding: 4px 16px; border-radius: var(--radius-full);
    }
    .lineup-blue .lineup-label { background: rgba(96,165,250,0.15); color: var(--blue-team-light); }
    .lineup-red .lineup-label { background: rgba(248,113,113,0.15); color: var(--red-team-light); }
    .lineup-heroes {
      display: flex; gap: 8px;
    }
    .lineup-hero {
      width: 52px; height: 52px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      animation: bounceIn 0.5s ease both;
    }
    .lineup-hero:nth-child(1) { animation-delay: 0.1s; }
    .lineup-hero:nth-child(2) { animation-delay: 0.2s; }
    .lineup-hero:nth-child(3) { animation-delay: 0.3s; }
    .lineup-hero:nth-child(4) { animation-delay: 0.4s; }
    .lineup-hero:nth-child(5) { animation-delay: 0.5s; }
    .lineup-blue .lineup-hero {
      background: rgba(96,165,250,0.12); border: 2px solid rgba(96,165,250,0.3);
    }
    .lineup-red .lineup-hero {
      background: rgba(248,113,113,0.12); border: 2px solid rgba(248,113,113,0.3);
    }
    .lineup-hero.is-me { border-color: var(--yellow); box-shadow: 0 0 12px rgba(255,217,61,0.3); }

    /* Progress */
    .loading-progress {
      max-width: 500px; margin: 0 auto; width: 100%;
    }
    .progress-label {
      display: flex; justify-content: space-between;
      font-size: 0.8rem; color: var(--text-on-dark-mid);
      margin-bottom: 8px;
    }
    .progress-track {
      height: 8px; background: rgba(255,255,255,0.06);
      border-radius: var(--radius-full); overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: var(--radius-full);
      background: linear-gradient(90deg, var(--primary), var(--yellow));
      transition: width 0.3s ease;
      position: relative;
    }
    .progress-fill::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      animation: shimmer 2s infinite;
    }

    /* Tip */
    .loading-tip {
      margin-top: 24px; font-size: 0.85rem; color: var(--text-on-dark-mid);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .loading-tip-icon { animation: wiggle 1s ease-in-out infinite; }

    /* Floating sparkles */
    .sparkle-el {
      position: fixed; font-size: 1rem; pointer-events: none;
      animation: sparkleFloat 4s ease-in-out infinite;
      opacity: 0.2;
    }
    @keyframes sparkleFloat {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.2; }
      50% { transform: translateY(-20px) scale(1.3); opacity: 0.5; }
    }

    @media (max-width: 768px) {
      .hero-reveal-card { padding: 28px; }
      .hero-avatar-big { width: 90px; height: 90px; font-size: 3rem; }
      .hero-name-big { font-size: 1.4rem; }
      .team-lineup { gap: 24px; flex-direction: column; }
      .lineup-heroes { flex-wrap: wrap; justify-content: center; }
      .hero-stats-mini { gap: 16px; }
    }
  </style>
</head>
<body>

  <div class="bg-grid"></div>

  <!-- Sparkles -->
  <div class="sparkle-el" style="top:15%;left:10%">✨</div>
  <div class="sparkle-el" style="top:25%;right:15%;animation-delay:1s">⭐</div>
  <div class="sparkle-el" style="bottom:20%;left:20%;animation-delay:0.5s">💫</div>
  <div class="sparkle-el" style="bottom:30%;right:10%;animation-delay:1.5s">✨</div>

  <div class="loading-container">
    <!-- Hero Reveal -->
    <div class="hero-reveal">
      <div class="hero-reveal-label">你的英雄</div>
      <div class="hero-reveal-card">
        <div class="hero-avatar-big">🔮</div>
        <div class="hero-name-big">星焰法师</div>
        <div class="hero-role-big">法师 · 远程AOE · 蓝队</div>
        <div class="hero-stats-mini">
          <div class="hero-stat">
            <div class="hero-stat-val">800</div>
            <div class="hero-stat-label">生命</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-val">600</div>
            <div class="hero-stat-label">法力</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-val">85</div>
            <div class="hero-stat-label">法强</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-val">310</div>
            <div class="hero-stat-label">移速</div>
          </div>
        </div>
        <div class="skills-preview">
          <div class="skill-icon-pre">🔥<span class="skill-key">Q</span></div>
          <div class="skill-icon-pre">❄️<span class="skill-key">W</span></div>
          <div class="skill-icon-pre">⚡<span class="skill-key">E</span></div>
          <div class="skill-icon-pre">🌟<span class="skill-key">R</span></div>
          <div style="width:12px"></div>
          <div class="skill-icon-pre">💨<span class="skill-key">D</span></div>
          <div class="skill-icon-pre">❄️<span class="skill-key">F</span></div>
        </div>
      </div>
    </div>

    <!-- Team Lineups -->
    <div class="team-lineup">
      <div class="lineup-team lineup-blue">
        <div class="lineup-label">💙 蓝队</div>
        <div class="lineup-heroes">
          <div class="lineup-hero">🛡️</div>
          <div class="lineup-hero is-me">🔮</div>
          <div class="lineup-hero">🏹</div>
          <div class="lineup-hero">💚</div>
          <div class="lineup-hero">⚔️</div>
        </div>
      </div>
      <div class="lineup-team lineup-red">
        <div class="lineup-label">❤️ 红队</div>
        <div class="lineup-heroes">
          <div class="lineup-hero">🛡️</div>
          <div class="lineup-hero">❄️</div>
          <div class="lineup-hero">🎯</div>
          <div class="lineup-hero">🌿</div>
          <div class="lineup-hero">🔥</div>
        </div>
      </div>
    </div>

    <!-- Progress -->
    <div class="loading-progress">
      <div class="progress-label">
        <span>加载游戏资源中...</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <!-- Tip -->
    <div class="loading-tip">
      <span class="loading-tip-icon">💡</span>
      <span id="tipText">小提示：按 Ctrl+Shift+B 可以一键隐藏游戏界面哦！</span>
    </div>
  </div>

  <script>
    // Simulate loading
    const fill = document.getElementById('progressFill');
    const pct = document.getElementById('progressPct');
    let progress = 0;
    const interval = setInterval(() => {
      progress += Math.random() * 15 + 3;
      if (progress >= 100) {
        progress = 100;
        clearInterval(interval);
        setTimeout(() => { location.href = '05-battle-hud.html'; }, 800);
      }
      fill.style.width = progress + '%';
      pct.textContent = Math.floor(progress) + '%';
    }, 400);

    // Rotate tips
    const tips = [
      '小提示：按 Ctrl+Shift+B 可以一键隐藏游戏界面哦！',
      '小提示：雪球命中敌人后再次使用可以突进过去！',
      '小提示：死亡后8秒固定复活，大胆冲就对了！',
      '小提示：先到30次击杀也可以获胜，疯狂输出吧！',
      '小提示：快捷表情按 Tab 键打开轮盘',
      '小提示：摸鱼大乱斗——10分钟一局，见面就团！'
    ];
    let tipIdx = 0;
    setInterval(() => {
      tipIdx = (tipIdx + 1) % tips.length;
      document.getElementById('tipText').textContent = tips[tipIdx];
    }, 3000);
  </script>
</body>
</html>
